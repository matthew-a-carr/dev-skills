name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  skills:
    name: Skill spec compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Validate skills
        run: |
          go tool skill-validator check --emit-annotations skills/
          go tool skill-validator check -o markdown skills/ >> "$GITHUB_STEP_SUMMARY"
